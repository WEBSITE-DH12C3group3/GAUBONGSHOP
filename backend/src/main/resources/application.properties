# Auto-load local env file when running from backend/
spring.config.import=optional:file:.env[.properties]

# Pusher
pusher.app-id=${PUSHER_APP_ID:}
pusher.key=${PUSHER_KEY:}
pusher.secret=${PUSHER_SECRET:}
pusher.cluster=${PUSHER_CLUSTER:ap1}
pusher.use-tls=${PUSHER_USE_TLS:true}

# Chat
chat.default-admin-id=1


# (Giữ nguyên các dòng DB và logging của bạn bên dưới)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:thu_bong_shop}?useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
logging.level.org.springframework.security=DEBUG
spring.web.resources.static-locations=classpath:/static/,file:uploads/,file:brandimg/


# ===== Mail =====
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.default-encoding=UTF-8

logging.level.com.thubongshop=DEBUG
logging.level.org.springframework.mail=DEBUG
logging.level.org.springframework.web=DEBUG

# ===== VNPAY =====
vnpay.tmnCode=${VNPAY_TMN_CODE:}
vnpay.hashSecret=${VNPAY_HASH_SECRET:}
vnpay.payUrl=${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
vnpay.returnUrl=${VNPAY_RETURN_URL:http://localhost:8080/api/payment/vnpay/return}

# ===== Shop =====
shop.origin.lat=21.027763
shop.origin.lng=105.834160
shop.origin.address=28 Phố Hàng Bài, Hoàn Kiếm, Hà Nội

ai.provider.enabled=true
ai.provider.endpoint=${AI_PROVIDER_ENDPOINT:https://api.groq.com/openai/v1/chat/completions}
ai.provider.apiKey=${AI_API_KEY:}
ai.provider.model=${AI_PROVIDER_MODEL:llama-3.1-8b-instant}
ai.provider.keywordThreshold=0.25
ai.provider.httpTimeoutMs=8000

logging:
  level:
    org.springframework.web.client.RestTemplate: DEBUG
    com.thubongshop.backend.chatbox: DEBUG
